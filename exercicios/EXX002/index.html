<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebras de linha</h1>
    <hr>
    <p>Você pode escrever um parágrafo de qualquer jeito. Basta colocar tudo no par de tags &lt;p e &gt;/p. </p> <!--lt = Less Than / gt = Greater Than-->

    <p>Se precisar quebrar o texto em um lugar específico <br> como esse, você pode usar a tag &lt;br&gt;.</p>
    
    <p>Vamos adicionar alguns símbolos especiais: 
        &reg;
        &copy;
        &trade;
    </p>
    <p>Emojis:
        &#x1F913;
        &#x261D;
        &#xFE0F;
    </p>
</body>
</html>
